name: Publish Package

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
      - run: npm i -g npm@latest # Ensure npm 11.5.1 or later is installed
      - run: npm ci
      - run: npm publish --access public
